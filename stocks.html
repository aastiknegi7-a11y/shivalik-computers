<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Stock | Shivalik Computer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  overflow-x:hidden;
  transition:0.4s;
}

/* ===== LIGHT MODE ===== */
.light{
  background:#f4f6f9;
  color:#111;
}
.light .slide{
  background:white;
  color:#111;
}

/* ===== NAVBAR ===== */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 50px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
  z-index:1000;
}

nav ul{
  display:flex;
  gap:25px;
  list-style:none;
}

nav a{
  text-decoration:none;
  color:white;
  font-weight:500;
}
nav a:hover{color:#00f5ff}

.toggle{
  background:#00f5ff;
  border:none;
  padding:8px 16px;
  border-radius:20px;
  cursor:pointer;
  font-weight:600;
}

/* ===== HEADER ===== */
.header{
  text-align:center;
  padding:60px 20px 40px;
}
.header h1{
  font-size:42px;
}
.header p{
  margin-top:10px;
  opacity:.8;
}

/* ===== SLIDER ===== */
.slider-wrap{
  position:relative;
  padding:40px 0 80px;
}

.slider{
  overflow:hidden;
  width:90%;
  max-width:1100px;
  margin:auto;
}

.track{
  display:flex;
  transition:transform .5s ease;
}

.slide{
  min-width:300px;
  margin:0 15px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:15px;
  text-align:center;
  transition:0.4s;
  box-shadow:0 0 25px rgba(0,255,255,0.2);
}
.slide:hover{
  transform:translateY(-10px) scale(1.05);
}

.slide img{
  width:100%;
  height:200px;
  object-fit:contain;
  border-radius:14px;
  background:white;
}

.slide p{
  margin-top:12px;
  font-weight:600;
}

/* ===== ARROWS ===== */
.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:34px;
  cursor:pointer;
  background:rgba(0,0,0,.8);
  padding:12px 18px;
  border-radius:50%;
  z-index:50;
  transition:0.3s;
}
.arrow.left{left:20px}
.arrow.right{right:20px}
.arrow:hover{
  background:#25d366;
  transform:translateY(-50%) scale(1.1);
}

/* ===== WHATSAPP FLOAT ===== */
.float-wa{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25d366;
  color:black;
  padding:16px;
  border-radius:50%;
  font-size:22px;
  text-decoration:none;
  box-shadow:0 0 20px rgba(0,0,0,.5);
}

/* ===== FULLSCREEN ===== */
.fullscreen{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.95);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.fullscreen img{
  max-width:95%;
  max-height:95%;
  border-radius:12px;
}
.closeFS{
  position:absolute;
  top:25px;
  right:30px;
  font-size:32px;
  cursor:pointer;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  nav{
    flex-direction:column;
    gap:15px;
  }
  .slide{min-width:240px}
  .header h1{font-size:28px}
}
</style>
</head>

<body>

<nav>
  <h2>Shivalik Computer</h2>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="stock.html">New Stock</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <button class="toggle" onclick="toggleMode()">🌙 Mode</button>
</nav>

<div class="header">
  <h1>Latest Stock Arrived</h1>
  <p>Explore new arrivals • Premium Quality • Best Prices</p>
</div>

<div class="slider-wrap">

<span class="arrow left" onclick="prev()">‹</span>
<span class="arrow right" onclick="next()">›</span>

<div class="slider">
  <div class="track" id="track">

    <div class="slide" onclick="openFS(this)">
      <img src="stocks/stock1.jpeg">
      <p>Stock Item 1</p>
    </div>

    <div class="slide" onclick="openFS(this)">
      <img src="stocks/stock2.jpeg">
      <p>Stock Item 2</p>
    </div>

    <div class="slide" onclick="openFS(this)">
      <img src="stocks/stock3.jpeg">
      <p>Stock Item 3</p>
    </div>

    <div class="slide" onclick="openFS(this)">
      <img src="stocks/stock4.jpeg">
      <p>Stock Item 4</p>
    </div>

  </div>
</div>
</div>

<a href="https://wa.me/917417045371" target="_blank" class="float-wa">💬</a>

<!-- FULLSCREEN -->
<div class="fullscreen" id="fs">
  <span class="closeFS" onclick="closeFS()">×</span>
  <img id="fsImg">
</div>

<script>

const track=document.getElementById("track");
let index=0;

/* DARK MODE */
function toggleMode(){
  document.body.classList.toggle("light");
}

/* AUTO SLIDE */
setInterval(()=>{
  next();
},4000);

function next(){
  const w=track.children[0].offsetWidth+30;
  if(index < track.children.length-2){
    index++;
  }else{
    index=0;
  }
  track.style.transform=`translateX(${-index*w}px)`;
}

function prev(){
  const w=track.children[0].offsetWidth+30;
  if(index>0){
    index--;
  }else{
    index=track.children.length-2;
  }
  track.style.transform=`translateX(${-index*w}px)`;
}

/* FULLSCREEN */
function openFS(el){
  const img=el.querySelector("img");
  document.getElementById("fsImg").src=img.src;
  document.getElementById("fs").style.display="flex";
  document.body.style.overflow="hidden";
}
function closeFS(){
  document.getElementById("fs").style.display="none";
  document.body.style.overflow="auto";
}

</script>

</body>
</html>
